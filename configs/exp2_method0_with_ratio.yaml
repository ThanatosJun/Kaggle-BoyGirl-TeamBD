experiment:
  name: "exp2_method0_with_ratio"
  description: "Exp 2-2: 全部基礎特徵 + weight/height ratio 衍生特徵 (Median補值)"

data:
  train_path: "train.csv"
  test_path: "test.csv"
  drop_cols: ["id", "yt", "self_intro"]
  target_col: "gender"
  target_train_mapping:
    "男": 1
    "女": 0
    "Male": 1
    "Female": 0
    1: 1
    2: 0
    0: 0
    "1": 1
    "0": 0
  target_output_mapping:
    0: 2
    1: 1

features:
  numeric_cols: ["height", "weight", "iq", "weight_height_ratio"]
  numeric_log_cols: ["fb_friends"]
  categorical_cols: ["star_sign", "phone_os"]
  ordinal_cols: ["sleepiness"]
  add_weight_height_ratio: true
  add_bmi: false

preprocessing:
  imputation_method: "method0"   # global Median (best from Exp1)
  imputation_mode: "old"
  numeric_imputer_strategy: "median"
  clipping_lower_percentile: 1
  clipping_upper_percentile: 99
  log_clip_min: 0
  scaler: "standard"
  onehot_handle_unknown: "ignore"
  onehot_sparse_output: false

model:
  type: "catboost"

  xgb_params:
    objective: "binary:logistic"
    eval_metric: "logloss"
    learning_rate: 0.1
    max_depth: 6
    random_state: 42
    enable_categorical: false

  lgbm_params:
    objective: "binary"
    learning_rate: 0.03
    n_estimators: 500
    num_leaves: 15
    max_depth: 5
    min_child_samples: 30
    feature_fraction: 0.8
    bagging_fraction: 0.8
    bagging_freq: 1
    reg_lambda: 2.0
    reg_alpha: 0.5
    verbosity: -1
    random_state: 42

  random_forest_params:
    n_estimators: 400
    max_depth: 10
    min_samples_split: 5
    min_samples_leaf: 3
    max_features: "sqrt"
    class_weight: "balanced"
    n_jobs: -1
    random_state: 42

  catboost_params:
    iterations: 500
    learning_rate: 0.05
    depth: 6
    l2_leaf_reg: 3
    border_count: 128
    random_seed: 42
    verbose: False
    auto_class_weights: "Balanced"

  param_grid:
    catboost:
      learning_rate: [0.03, 0.05, 0.1]
      depth: [4, 6, 8]
      l2_leaf_reg: [1, 3, 5]

search:
  enabled: false
  param_grid_mode: full
  metric: "f1"

training:
  n_splits: 5
  use_smote: false
  class_weight: "balanced"
  random_state: 42
  save_dir: "experiments"
  smote_params:
    random_state: 42

prediction:
  default_mode: "full"
  output_dir: "result"
