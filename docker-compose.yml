version: '3.8'

services:
  boygirl-train:
    build: .
    container_name: boygirl-training
    volumes:
      # Mount dataset (read-only recommended)
      - ./dataset:/workspace/dataset:ro

      # Mount config (can be modified)
      - ./config:/workspace/config

      # Mount results and logs (output)
      - ./results:/workspace/results
      - ./logs:/workspace/logs

      # Mount source code (for development)
      - ./src:/workspace/src
      - ./notebooks:/workspace/notebooks

    environment:
      - PYTHONUNBUFFERED=1

    # Override default command if needed
    command: python train.py --config config/train_config.yaml --exp_name baseline_v1

    # Optional: Limit resources
    # deploy:
    #   resources:
    #     limits:
    #       cpus: '4'
    #       memory: 8G
